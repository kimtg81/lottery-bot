name: Test Lottery Run

on:
  workflow_dispatch: # 수동 실행을 위해 필요

jobs:
  run_all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - run: pip install -r requirements.txt

      # 1. 로또 구매: 수동 4게임 + 자동 1게임
      - name: Run Lotto Test
        run: |
          echo "수동 구매 4회 진행"
          python main.py --type lotto --lotto_type 1 --number "3,5,9,25,31,37"
          python main.py --type lotto --lotto_type 1 --number "3,5,9,25,31,37"
          python main.py --type lotto --lotto_type 1 --number "3,5,9,25,31,37"
          python main.py --type lotto --lotto_type 1 --number "3,5,9,25,31,37"
          echo "자동 구매 1회 진행"
          python main.py --type lotto --lotto_type 0
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PW: ${{ secrets.USER_PW }}

      # 2. 연금복권 811203 구매
      - name: Run Pension 811203 Test
        run: python main.py --type pension --number 811203
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PW: ${{ secrets.USER_PW }}

      # 3. 연금복권 359517 구매
      - name: Run Pension 359517 Test
        run: python main.py --type pension --number 359517
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PW: ${{ secrets.USER_PW }}
